<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
<meta name="theme-color" content="#2d6a4f"/>
<title>Kvittodelning</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="config.js"></script>
<link rel="stylesheet" href="style.css"/>
</head>
<body>

  
<div id="authGate"></div>

<div class="app" id="mainApp" style="display:none">
  <header class="hdr">
    <h1>Kvittodelning</h1>
    <div class="hdr-right">
      <span class="klan-pill" id="klanPill" onclick="showTab('klan', document.querySelectorAll('.tab')[5])">–</span>
      <select class="period-sel" id="periodSel" onchange="onPeriodChange(this.value)">
        <option value="">– välj period –</option>
      </select>
      <button class="klan-pill" id="createPeriodBtn" style="display:none" onclick="showTab('periods', document.querySelectorAll('.tab')[4])">+ Skapa period</button>
    </div>
  </header>
  <nav class="tabs">
    <button class="tab on" onclick="showTab('receipts',this)">🧾 Kvitton</button>
    <button class="tab" onclick="showTab('bulk',this)">➕ Flera</button>
    <button class="tab" onclick="showTab('report',this)">📊 Rapport</button>
    <button class="tab" onclick="showTab('families',this)">👨‍👩‍👧 Familjer</button>
    <button class="tab" onclick="showTab('periods',this)">📅 Perioder</button>
    <button class="tab" onclick="showTab('klan',this)">👥 Klan</button>
  </nav>
  <main class="main">
    <div id="tab-receipts"></div>
    <div id="tab-report" style="display:none"></div>
    <div id="tab-families" style="display:none"></div>
    <div id="tab-periods" style="display:none"></div>
    <div id="tab-bulk" style="display:none"></div>
    <div id="tab-klan" style="display:none"></div>
  </main>
</div>

<!-- Modal container -->
<div id="modal" style="display:none"></div>

<script src="app.js"></script>
</body>
</html>
